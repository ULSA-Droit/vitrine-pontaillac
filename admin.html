<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — La Vitrine de Pontaillac</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ee;
    --dark: #1a1714;
    --gold: #b8965a;
    --muted: #8a8078;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; }

  /* LOGIN */
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
    background: var(--dark);
  }
  .login-box {
    background: var(--cream); padding: 48px 36px; text-align: center;
    width: 100%; max-width: 360px; border-top: 3px solid var(--gold);
    border-radius: 4px;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); margin-bottom: 4px; }
  .login-logo em { color: var(--gold); font-style: italic; }
  .login-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }
  .login-box input {
    width: 100%; border: none; border-bottom: 2px solid var(--gold);
    padding: 14px 12px; font-family: 'Montserrat', sans-serif;
    font-size: 20px; outline: none; background: transparent;
    text-align: center; letter-spacing: 6px; margin-bottom: 20px; color: var(--dark);
  }
  .login-box button {
    width: 100%; background: var(--dark); color: var(--cream); border: none;
    padding: 16px; cursor: pointer; font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; font-family: 'Montserrat', sans-serif; border-radius: 2px;
    transition: background .2s;
  }
  .login-box button:hover { background: var(--gold); color: var(--dark); }
  .login-error { color: #c0392b; font-size: 11px; margin-top: 10px; letter-spacing: 1px; display: none; }

  /* ADMIN */
  .admin-screen { display: none; }
  .admin-screen.active { display: block; }

  .admin-topbar {
    background: var(--dark); padding: 18px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  .admin-topbar-title { color: var(--cream); font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 400; }
  .admin-topbar-title span { color: var(--gold); font-style: italic; }
  .admin-topbar-right { display: flex; gap: 10px; align-items: center; }
  .admin-topbar-site { background: none; border: 1px solid rgba(184,150,90,0.3); color: rgba(255,255,255,0.6); padding: 7px 14px; font-size: 11px; letter-spacing: 1px; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 2px; text-decoration: none; }
  .admin-topbar-logout { background: none; border: 1px solid rgba(184,150,90,0.5); color: var(--gold); padding: 8px 14px; font-size: 11px; letter-spacing: 1px; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 2px; }

  .admin-section { padding: 20px; border-bottom: 1px solid rgba(184,150,90,0.2); }
  .admin-section-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .collection-row { display: flex; gap: 10px; align-items: center; }
  .collection-row input { flex: 1; border: 1px solid rgba(184,150,90,0.4); border-radius: 4px; padding: 12px 14px; font-family: 'Montserrat', sans-serif; font-size: 14px; background: #fff; outline: none; color: var(--dark); }
  .collection-row input:focus { border-color: var(--gold); }
  .btn-ok { background: var(--dark); color: var(--gold); border: none; padding: 12px 18px; font-size: 13px; cursor: pointer; border-radius: 4px; font-family: 'Montserrat', sans-serif; flex-shrink: 0; min-width: 52px; }

  .admin-articles { padding: 16px 20px; }
  .acc-card { border: 1px solid rgba(184,150,90,0.25); border-radius: 10px; margin-bottom: 12px; overflow: hidden; background: #fff; }
  .acc-card.open { border-color: var(--gold); }
  .acc-header { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .acc-thumb { width: 48px; height: 60px; object-fit: cover; border-radius: 6px; background: #e8e2d9; flex-shrink: 0; }
  .acc-info { flex: 1; min-width: 0; }
  .acc-info strong { display: block; font-size: 13px; font-weight: 500; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .acc-info span { font-size: 11px; color: var(--muted); margin-top: 2px; display: block; }
  .acc-arrow { color: var(--gold); font-size: 14px; flex-shrink: 0; transition: transform .3s; }
  .acc-card.open .acc-arrow { transform: rotate(180deg); }
  .acc-body { display: none; padding: 0 16px 18px; border-top: 1px solid rgba(184,150,90,0.15); }
  .acc-card.open .acc-body { display: block; }

  .photo-zone { border: 2px dashed rgba(184,150,90,0.45); border-radius: 8px; padding: 20px; text-align: center; margin: 14px 0 10px; cursor: pointer; position: relative; background: #faf8f5; transition: border-color .2s; }
  .photo-zone:hover { border-color: var(--gold); }
  .photo-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-zone-icon { font-size: 28px; margin-bottom: 6px; }
  .photo-zone p { font-size: 13px; color: var(--dark); font-weight: 500; margin-bottom: 2px; }
  .photo-zone small { font-size: 11px; color: var(--muted); }
  .upload-info { font-size: 11px; color: var(--gold); letter-spacing: 1px; text-align: center; min-height: 18px; margin-bottom: 10px; }

  .acc-field { margin-bottom: 14px; }
  .acc-field label { display: block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .acc-field input { width: 100%; border: 1px solid #e0dbd4; border-radius: 6px; padding: 13px 14px; font-family: 'Montserrat', sans-serif; font-size: 14px; outline: none; color: var(--dark); background: #fff; transition: border-color .2s; }
  .acc-field input:focus { border-color: var(--gold); }

  .btn-apply-mobile { width: 100%; background: var(--dark); color: var(--cream); border: none; padding: 16px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 8px; margin-top: 6px; transition: background .2s; }
  .btn-apply-mobile.success { background: #27ae60; }
  .btn-apply-mobile:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-delete-mobile { width: 100%; background: none; color: #c0392b; border: 1px solid #c0392b; padding: 13px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 8px; margin-top: 8px; transition: background .2s, color .2s; }
  .btn-delete-mobile:hover { background: #c0392b; color: #fff; }
  .btn-add-article { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: none; border: 2px dashed rgba(184,150,90,0.4); color: var(--gold); padding: 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 10px; margin-top: 4px; transition: border-color .2s, background .2s; }
  .btn-add-article:hover { border-color: var(--gold); background: rgba(184,150,90,0.05); }
  .admin-hint { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 1px; padding: 20px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">La <em>Vitrine</em> de Pontaillac</div>
    <div class="login-sub">Administration</div>
    <input type="password" id="pwdInput" placeholder="Code boutique" onkeydown="if(event.key==='Enter') checkPwd()">
    <button onclick="checkPwd()">Accéder</button>
    <p class="login-error" id="pwdError">Mot de passe incorrect</p>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="admin-topbar">
    <div class="admin-topbar-title">✦ <span>Gestion</span> Vitrine</div>
    <div class="admin-topbar-right">
      <a class="admin-topbar-site" href="/" target="_blank">← Voir le site</a>
      <button class="admin-topbar-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">Bandeau de collection</div>
    <div class="collection-row">
      <input type="text" id="collectionInput" placeholder="ex: Nouveautés Été 2025">
      <button class="btn-ok" id="collectionBtn" onclick="applyCollection()">OK</button>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">Carte de contact</div>
    <div style="margin-bottom:12px;">
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;">Téléphone</div>
      <div class="collection-row">
        <input type="tel" id="contactPhoneInput" placeholder="06 XX XX XX XX">
        <button class="btn-ok" id="contactPhoneBtn" onclick="applyContact('phone')">OK</button>
      </div>
    </div>
    <div>
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;">Email</div>
      <div class="collection-row">
        <input type="email" id="contactEmailInput" placeholder="contact@lavitrinedepontaillac.fr">
        <button class="btn-ok" id="contactEmailBtn" onclick="applyContact('email')">OK</button>
      </div>
    </div>
  </div>

  <div class="admin-articles" id="adminGrid"></div>
  <div style="padding:0 20px 20px;">
    <button class="btn-add-article" onclick="addArticle()">＋ Ajouter un article</button>
  </div>
  <div class="admin-hint">Appuyez sur un article pour le modifier</div>
</div>

<script>
  const SUPA_URL = 'https://slmhdunijukcakntcxgp.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsbWhkdW5panVrY2FrbnRjeGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDA0MTAsImV4cCI6MjA4OTY3NjQxMH0.hsj_p-GXLTioIurPFI9Lsf9XGwpzi9iHhfYJTQxb9JA';
  const BUCKET = 'vitrine-photos';
  const ADMIN_EMAIL = 'karl-nicolas.brigy@orange.fr';
  const PWD_HASH = '0e214538b174f62a96ccf1a9ac7254b364c3769308e709e65d812118e10c68d5';

  const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };
  let items = [];
  let authToken = null;
  let contactCache = { phone: '', email: '' };

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function authHeaders() {
    return { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (authToken || SUPA_KEY), 'Content-Type': 'application/json' };
  }

  async function loginSupabase(password) {
    const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: ADMIN_EMAIL, password })
    });
    if (!r.ok) return false;
    const data = await r.json();
    authToken = data.access_token;
    return true;
  }

  async function dbGet(table, params) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, { headers: H });
    return r.json();
  }
  async function dbPatch(table, filter, body) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}`, {
      method: 'PATCH', headers: { ...authHeaders(), 'Prefer': 'return=minimal' }, body: JSON.stringify(body)
    });
  }
  async function uploadPhoto(blob, articleId) {
    const path = `article-${articleId}-${Date.now()}.jpg`;
    const r = await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (authToken || SUPA_KEY), 'Content-Type': 'image/jpeg', 'Cache-Control': '3600', 'x-upsert': 'true' },
      body: blob
    });
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    return `${SUPA_URL}/storage/v1/object/public/${BUCKET}/${path}`;
  }
  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX_W = 900;
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => resolve({ blob, origSize: file.size, compSize: blob.size }), 'image/jpeg', 0.82);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function renderAdmin() {
    const grid = document.getElementById('adminGrid');
    grid.innerHTML = '';
    items.forEach(item => {
      const i = item.id;
      const card = document.createElement('div');
      card.className = 'acc-card';
      card.id = `acc-${i}`;
      card.innerHTML = `
        <div class="acc-header" onclick="toggleAcc(${i})">
          <img class="acc-thumb" id="prev-${i}" src="${item.img_url}" alt="" onerror="this.style.background='#e8e2d9'">
          <div class="acc-info">
            <strong>${item.name}</strong>
            <span>${item.brand} · ${item.price} €</span>
          </div>
          <span class="acc-arrow">▼</span>
        </div>
        <div class="acc-body">
          <div class="photo-zone" id="zone-${i}">
            <input type="file" accept="image/*" onchange="handlePhoto(this,${i})">
            <div class="photo-zone-icon">📷</div>
            <p>Changer la photo</p>
            <small>Galerie ou appareil photo</small>
          </div>
          <div class="upload-info" id="info-${i}"></div>
          <div class="acc-field"><label>Marque</label><input type="text" id="brand-${i}" value="${item.brand}"></div>
          <div class="acc-field"><label>Nom du vêtement</label><input type="text" id="name-${i}" value="${item.name}"></div>
          <div class="acc-field"><label>Prix (€)</label><input type="text" id="price-${i}" value="${item.price}" inputmode="numeric"></div>
          <div class="acc-field"><label>Étiquette</label><input type="text" id="tag-${i}" value="${item.tag}"></div>
          <button class="btn-apply-mobile" id="applybtn-${i}" onclick="applyCard(${i})">✓ Appliquer</button>
          <button class="btn-delete-mobile" onclick="deleteArticle(${i})">🗑 Supprimer cet article</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  function toggleAcc(i) {
    const card = document.getElementById(`acc-${i}`);
    const isOpen = card.classList.contains('open');
    document.querySelectorAll('.acc-card').forEach(c => c.classList.remove('open'));
    if (!isOpen) card.classList.add('open');
  }

  async function handlePhoto(input, i) {
    if (!input.files || !input.files[0]) return;
    const zone = document.getElementById(`zone-${i}`);
    const info = document.getElementById(`info-${i}`);
    const btn = document.getElementById(`applybtn-${i}`);
    zone.querySelector('p').textContent = '⏳ Compression…';
    info.textContent = ''; btn.disabled = true;
    try {
      const { blob, origSize, compSize } = await compressImage(input.files[0]);
      zone.querySelector('p').textContent = '⬆ Envoi en cours…';
      const url = await uploadPhoto(blob, i);
      items.find(x => x.id === i).img_url = url;
      document.getElementById(`prev-${i}`).src = url;
      zone.querySelector('p').textContent = '✓ Photo mise à jour';
      zone.querySelector('small').textContent = `${Math.round(origSize/1024)} Ko → ${Math.round(compSize/1024)} Ko`;
      info.textContent = '📸 Photo uploadée — appuyez sur Appliquer pour sauvegarder';
    } catch(e) { zone.querySelector('p').textContent = '❌ Erreur — réessayez'; }
    btn.disabled = false;
  }

  async function applyCard(i) {
    const btn = document.getElementById(`applybtn-${i}`);
    btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';
    const update = {
      img_url: items.find(x => x.id === i).img_url,
      brand: document.getElementById(`brand-${i}`).value,
      name: document.getElementById(`name-${i}`).value,
      price: document.getElementById(`price-${i}`).value,
      tag: document.getElementById(`tag-${i}`).value,
    };
    try {
      await dbPatch('articles', `id=eq.${i}`, update);
      Object.assign(items.find(x => x.id === i), update);
      btn.textContent = '✓ Sauvegardé !'; btn.classList.add('success');
      document.getElementById(`info-${i}`).textContent = '';
      setTimeout(() => { btn.textContent = '✓ Appliquer'; btn.classList.remove('success'); btn.disabled = false; }, 2000);
    } catch(e) { btn.textContent = '❌ Erreur — réessayer'; btn.disabled = false; }
  }

  async function deleteArticle(i) {
    if (!confirm('Supprimer cet article et sa photo ?')) return;
    const item = items.find(x => x.id === i);
    try {
      if (item.img_url && item.img_url.includes(SUPA_URL)) {
        const path = item.img_url.split(`/object/public/${BUCKET}/`)[1];
        if (path) await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${path}`, { method: 'DELETE', headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + (authToken || SUPA_KEY) } });
      }
      await fetch(`${SUPA_URL}/rest/v1/articles?id=eq.${i}`, { method: 'DELETE', headers: { ...authHeaders(), 'Prefer': 'return=minimal' } });
      items = items.filter(x => x.id !== i);
      renderAdmin();
    } catch(e) { alert('Erreur lors de la suppression, réessayez.'); }
  }

  async function addArticle() {
    const newId = items.length > 0 ? Math.max(...items.map(x => x.id)) + 1 : 0;
    const newItem = { id: newId, img_url: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&q=80', brand: 'Marque', name: 'Nouveau vêtement', price: '0', tag: 'Nouveau', size: 'Taille unique' };
    try {
      await fetch(`${SUPA_URL}/rest/v1/articles`, { method: 'POST', headers: { ...authHeaders(), 'Prefer': 'return=minimal' }, body: JSON.stringify(newItem) });
      items.push(newItem); renderAdmin();
      setTimeout(() => toggleAcc(newId), 100);
    } catch(e) { alert('Erreur lors de l\'ajout, réessayez.'); }
  }

  async function applyCollection() {
    const val = document.getElementById('collectionInput').value.trim();
    if (!val) return;
    const btn = document.getElementById('collectionBtn');
    btn.textContent = '…'; btn.disabled = true;
    try {
      await dbPatch('settings', 'key=eq.collection_label', { value: val });
      btn.textContent = '✓'; btn.style.background = '#27ae60';
      setTimeout(() => { btn.textContent = 'OK'; btn.style.background = ''; btn.disabled = false; }, 2000);
    } catch(e) { btn.textContent = '❌'; btn.disabled = false; }
  }

  async function applyContact(type) {
    const isPhone = type === 'phone';
    const inputId = isPhone ? 'contactPhoneInput' : 'contactEmailInput';
    const btnId = isPhone ? 'contactPhoneBtn' : 'contactEmailBtn';
    const key = isPhone ? 'contact_phone' : 'contact_email';
    const val = document.getElementById(inputId).value.trim();
    if (!val) return;
    const btn = document.getElementById(btnId);
    btn.textContent = '…'; btn.disabled = true;
    try {
      await dbPatch('settings', `key=eq.${key}`, { value: val });
      btn.textContent = '✓'; btn.style.background = '#27ae60';
      setTimeout(() => { btn.textContent = 'OK'; btn.style.background = ''; btn.disabled = false; }, 2000);
    } catch(e) { btn.textContent = '❌'; btn.disabled = false; }
  }

  async function checkPwd() {
    const val = document.getElementById('pwdInput').value;
    const hash = await sha256(val);
    if (hash !== PWD_HASH) {
      document.getElementById('pwdError').style.display = 'block';
      document.getElementById('pwdInput').value = '';
      return;
    }
    const btn = document.querySelector('.login-box button');
    btn.textContent = '⏳ Connexion…'; btn.disabled = true;
    const ok = await loginSupabase(val);
    btn.textContent = 'Accéder'; btn.disabled = false;
    if (!ok) {
      document.getElementById('pwdError').textContent = 'Erreur de connexion — réessayez';
      document.getElementById('pwdError').style.display = 'block';
      return;
    }
    // Charger les données
    const [articles, settings] = await Promise.all([
      dbGet('articles', 'order=id.asc'),
      dbGet('settings', '')
    ]);
    items = articles;
    const get = key => settings.find(s => s.key === key)?.value || '';
    document.getElementById('collectionInput').value = get('collection_label') || '';
    document.getElementById('contactPhoneInput').value = get('contact_phone') || '';
    document.getElementById('contactEmailInput').value = get('contact_email') || '';
    renderAdmin();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').classList.add('active');
  }

  function logout() {
    authToken = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').classList.remove('active');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdError').style.display = 'none';
  }
</script>
</body>
</html>
